<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaBr406</title>
  <script>(function(){try{var t=localStorage.getItem('site-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f5f5f7;
      --card: rgba(0,0,0,0.03);
      --card-border: rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.1);
      --nav-bg: rgba(245,245,247,0.72);
      --nav-border: rgba(0,0,0,0.06);
      --mobile-nav-bg: rgba(255,255,255,0.95);
      --mobile-nav-border: rgba(0,0,0,0.06);
    }
    :root[data-theme="dark"] {
      --bg: #050505;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --text2: #86868b;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --nav-bg: rgba(5,5,5,0.72);
      --nav-border: rgba(255,255,255,0.06);
      --mobile-nav-bg: rgba(10,10,10,0.95);
      --mobile-nav-border: rgba(255,255,255,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #050505;
        --card: rgba(255,255,255,0.04);
        --card-border: rgba(255,255,255,0.08);
        --text: #f5f5f7;
        --text2: #86868b;
        --accent: #3b82f6;
        --accent-glow: rgba(59,130,246,0.15);
        --nav-bg: rgba(5,5,5,0.72);
        --nav-border: rgba(255,255,255,0.06);
        --mobile-nav-bg: rgba(10,10,10,0.95);
        --mobile-nav-border: rgba(255,255,255,0.06);
      }
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 导航栏 - 毛玻璃 ===== */
    nav {
      position: fixed; top: 0; width: 100%;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--nav-border);
      z-index: 100;
    }
    .nav-inner {
      max-width: 980px; margin: 0 auto; padding: 0 22px;
      display: flex; align-items: center; justify-content: space-between; height: 48px;
      position: relative;
    }
    .nav-logo {
      font-size: 17px; font-weight: 600; color: var(--text);
      text-decoration: none; letter-spacing: -0.3px;
    }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a {
      color: var(--text2); text-decoration: none; font-size: 13px;
      transition: color 0.3s; letter-spacing: 0.01em;
    }
    .nav-links a:hover { color: var(--text); }
    .btn-nav {
      padding: 6px 16px; border-radius: 20px; font-size: 12px;
      text-decoration: none; cursor: pointer; border: none;
      transition: all 0.3s ease; letter-spacing: 0.01em;
    }
    .btn-login {
      background: var(--accent); color: #fff; font-weight: 600;
    }
    .btn-login:hover { background: #60a5fa; transform: scale(1.02); }
    .btn-register {
      background: transparent; color: var(--text2);
      border: 1px solid var(--card-border);
    }
    .btn-register:hover { border-color: var(--text2); color: var(--text); }
    .theme-toggle-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: transparent;
      color: var(--text2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover { color: var(--text); border-color: var(--accent); background: var(--card); }
    .theme-toggle-mobile {
      display: none;
      position: absolute;
      right: 56px;
      top: 8px;
      z-index: 102;
    }
    .user-info { display: flex; align-items: center; gap: 10px; }
    .user-info img { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; }
    .user-info span { font-size: 13px; color: var(--text); }
    .btn-logout {
      background: transparent; color: var(--text2);
      border: 1px solid var(--card-border);
      font-size: 11px; padding: 4px 10px; border-radius: 14px;
    }

    /* ===== 背景光晕 ===== */
    .bg-glow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .glow-orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.15;
      animation: float 20s ease-in-out infinite;
    }
    .glow-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.3), transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }
    .glow-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
      top: 30%; right: -15%;
      animation-delay: -7s;
    }
    .glow-3 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(56,189,248,0.2), transparent 70%);
      bottom: -5%; left: 30%;
      animation-delay: -14s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ===== Hero 区域 ===== */
    .hero {
      position: relative; z-index: 1;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 120px 24px 80px; text-align: center;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 16px; border-radius: 20px;
      background: var(--card);
      border: 1px solid var(--card-border);
      font-size: 13px; color: var(--text2);
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }
    .hero-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #34d399; animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
    }
    .hero h1 {
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 700; letter-spacing: -2px;
      line-height: 1.05;
      background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
    }
    .hero p {
      font-size: clamp(16px, 2.5vw, 20px);
      color: var(--text2); max-width: 500px;
      line-height: 1.6; letter-spacing: -0.01em;
    }
    .hero-actions {
      display: flex; gap: 12px; margin-top: 40px;
    }
    .btn-hero {
      padding: 12px 28px; border-radius: 24px; font-size: 15px;
      text-decoration: none; cursor: pointer; border: none;
      transition: all 0.3s ease; font-weight: 500;
    }
    .btn-hero-primary {
      background: var(--accent); color: #fff;
    }
    .btn-hero-primary:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 8px 30px var(--accent-glow); }
    .btn-hero-secondary {
      background: var(--card); color: var(--text);
      border: 1px solid var(--card-border);
    }
    .btn-hero-secondary:hover { background: rgba(0,0,0,0.06); transform: translateY(-1px); }

    /* ===== 功能卡片区 ===== */
    .section {
      position: relative; z-index: 1;
      max-width: 980px; margin: 0 auto;
      padding: 80px 24px;
    }
    .section-title {
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 700; letter-spacing: -1px;
      text-align: center; margin-bottom: 12px;
    }
    .section-sub {
      font-size: 16px; color: var(--text2);
      text-align: center; margin-bottom: 56px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 36px 28px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      backdrop-filter: blur(10px);
    }
    .card:hover {
      background: rgba(0,0,0,0.05);
      border-color: rgba(0,0,0,0.1);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
    }
    .card-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px; font-size: 22px;
      background: rgba(59,130,246,0.1);
    }
    .card h3 {
      font-size: 18px; font-weight: 600; margin-bottom: 8px;
      letter-spacing: -0.3px;
    }
    .card p {
      font-size: 14px; color: var(--text2); line-height: 1.6;
    }

    /* ===== 滚动渐入动画 ===== */
    .fade-in {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .fade-in.visible {
      opacity: 1; transform: translateY(0);
    }

    /* ===== Footer ===== */
    footer {
      position: relative; z-index: 1;
      padding: 40px 24px; text-align: center;
      color: var(--text2); font-size: 12px;
      border-top: 1px solid var(--card-border);
    }
    footer a { color: var(--text2); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--text); }

    /* ===== 弹窗 ===== */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(40px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 32px; width: 90%; max-width: 360px;
      animation: modalIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal h3 { margin-bottom: 20px; font-size: 1.15rem; font-weight: 600; }
    .modal input {
      width: 100%; padding: 11px 14px;
      border: 1px solid var(--card-border);
      border-radius: 10px; background: var(--card);
      color: var(--text); font-size: 14px; margin-bottom: 10px;
      outline: none; transition: border-color 0.2s;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
    .modal-actions button {
      flex: 1; padding: 11px; border: none; border-radius: 10px;
      font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .modal-actions button:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: #fff; font-weight: 600; }
    .btn-secondary { background: var(--card); color: var(--text2); }
    .auth-switch { margin-top: 14px; text-align: center; font-size: 13px; color: var(--text2); }
    .auth-switch a { color: var(--accent); text-decoration: none; }
    #captchaRow {
      display: none; align-items: center; gap: 8px; margin-bottom: 10px;
    }
    #captchaRow input { width: 100px; margin-bottom: 0; }
    #captchaRow span { font-weight: 600; white-space: nowrap; font-size: 14px; }
    .btn-sm {
      padding: 6px 10px; font-size: 12px; border: none; border-radius: 8px;
      cursor: pointer; background: var(--card); color: var(--text2);
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(20,20,20,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 10px 24px; border-radius: 12px; font-size: 14px;
      opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== Hamburger ===== */
    .hamburger {
      display: none; background: none; border: none; cursor: pointer;
      flex-direction: column; gap: 4px; padding: 4px; z-index: 101;
    }
    .hamburger span {
      display: block; width: 18px; height: 1.5px; background: var(--text);
      border-radius: 2px; transition: transform 0.3s, opacity 0.3s;
    }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
    .menu-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 99;
    }
    .menu-overlay.show { display: block; }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .hamburger { display: flex; }
      .theme-toggle-mobile { display: inline-flex; }
      .nav-links .theme-toggle-btn { display: none; }
      .nav-links {
        display: none; position: fixed; top: 0; right: 0;
        width: 240px; height: 100vh;
        background: var(--mobile-nav-bg);
        backdrop-filter: blur(30px);
        border-left: 1px solid var(--mobile-nav-border);
        flex-direction: column; align-items: flex-start;
        padding: 64px 24px 24px; gap: 0; z-index: 100;
        animation: slideIn 0.3s ease;
      }
      @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .nav-links.open { display: flex; }
      .nav-links a {
        font-size: 15px; padding: 14px 0; width: 100%;
        border-bottom: 1px solid var(--card-border);
      }
      #guestBtns, #userBtns {
        flex-direction: column; width: 100%; gap: 8px; margin-top: 16px;
      }
      #guestBtns { display: flex; }
      .nav-links .btn-nav { width: 100%; text-align: center; padding: 10px; font-size: 14px; }
      .user-info { flex-direction: column; align-items: flex-start; gap: 10px; width: 100%; }
      .hero h1 { letter-spacing: -1px; }
      .hero-actions { flex-direction: column; align-items: center; }
      .btn-hero { width: 200px; text-align: center; }
      .cards { grid-template-columns: 1fr; }
      .section { padding: 60px 20px; }
      footer { padding: 24px 16px; font-size: 11px; }
    }
  
    /* ===== 暗色模式覆盖 ===== */
    :root[data-theme="dark"] .glow-orb { opacity: 0.35; }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .glow-orb { opacity: 0.35; }
      :root:not([data-theme="light"]) .btn-hero-primary:hover { background: #60a5fa; }
      :root:not([data-theme="light"]) .btn-hero-secondary:hover { background: rgba(255,255,255,0.12); }
      :root:not([data-theme="light"]) .card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
      :root:not([data-theme="light"]) .modal-overlay { background: rgba(0,0,0,0.6); }
      :root:not([data-theme="light"]) .modal { background: rgba(30,30,30,0.95); border-color: rgba(255,255,255,0.1); }
      :root:not([data-theme="light"]) .toast { color: var(--bg); }
    }
  </style>
</head>
<body>
  <!-- 背景光晕 -->
  <div class="bg-glow">
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
    <div class="glow-orb glow-3"></div>
  </div>

  <!-- 导航栏 -->
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">NaBr406</a>
      <button class="theme-toggle-btn theme-toggle-mobile" data-theme-toggle type="button" title="切换主题"></button>
      <button class="hamburger" onclick="toggleMenu()" aria-label="菜单"><span></span><span></span><span></span></button>
      <div class="nav-links" id="navLinks">
        <a href="/space/">空间</a>
        <a href="/space/announcements">公告</a>
        <a href="/blog">博客</a>
        <a href="/chitchat">杂谈</a>
        <a href="/ai/">AI助手</a>
        <button class="theme-toggle-btn" data-theme-toggle type="button" title="切换主题"></button>
        <a href="/admin.html" id="adminLink" style="display:none">管理</a>
        <div id="guestBtns">
          <button class="btn-nav btn-login" onclick="showAuth('login')">登录</button>
          <button class="btn-nav btn-register" onclick="showAuth('register')">注册</button>
        </div>
        <div id="userBtns" style="display:none" class="user-info">
          <img id="userAvatar" src="/default-avatar.png">
          <span id="userName"></span>
          <button class="btn-nav btn-logout" onclick="doLogout()">退出</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-badge fade-in"><span class="dot"></span> 龙虾友情出演</div>
    <h1 class="fade-in">NaBr406</h1>
    <div class="hero-actions fade-in">
      <a href="/space/" class="btn-hero btn-hero-primary">进入空间</a>
      <a href="/ai/" class="btn-hero btn-hero-secondary">AI助手</a>
      <a href="https://github.com/NaBr406" target="_blank" class="btn-hero btn-hero-secondary">GitHub</a>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 NaBr406 · <a href="https://github.com/NaBr406">GitHub</a> · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">鄂ICP备2026008759号</a></p>
  </footer>

  <!-- 登录/注册弹窗 -->
  <div class="modal-overlay" id="authModal">
    <div class="modal">
      <h3 id="authTitle">登录</h3>
      <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
      <input type="password" id="authPassword" placeholder="密码" autocomplete="current-password">
      <div id="inviteRow" style="display:none">
        <input type="text" id="authInviteCode" placeholder="邀请码" autocomplete="off" style="text-transform:uppercase">
      </div>
      <div id="nicknameRow" style="display:none">
        <input type="text" id="authNickname" placeholder="昵称（选填）">
      </div>
      <div id="captchaRow">
        <span id="captchaQuestion"></span>
        <input type="text" id="captchaInput" placeholder="答案" inputmode="numeric">
        <button type="button" class="btn-sm" onclick="refreshCaptcha()">换一题</button>
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="authSubmitBtn" onclick="doLogin()">登录</button>
        <button class="btn-secondary" onclick="closeAuth()">取消</button>
      </div>
      <div class="auth-switch" id="authSwitch"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

  <script src="/theme.js?v=2026030503"></script>
  <script>
    try {
      const currentToken = localStorage.getItem("token");
      if (currentToken && !currentToken.startsWith("eyJ")) {
        localStorage.setItem("ps_main_token", currentToken);
      }
      const psMainToken = localStorage.getItem("ps_main_token");
      if (psMainToken && currentToken && currentToken.startsWith("eyJ")) {
        localStorage.setItem("token", psMainToken);
      }
    } catch (e) {}
    const API = "/api";
    let captchaToken = "";

    // 滚动渐入
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 100);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // 检查登录状态
    (async function() {
      const token = localStorage.getItem("token");
      if (!token) return;
      try {
        const res = await fetch(API + "/me", { headers: { "Authorization": "Bearer " + token } });
        if (!res.ok) { localStorage.removeItem("token"); return; }
        const user = await res.json();
        showLoggedIn(user);
      } catch { localStorage.removeItem("token"); }
    })();

    function showLoggedIn(user) {
      document.getElementById("guestBtns").style.display = "none";
      document.getElementById("userBtns").style.display = "flex";
      document.getElementById("userName").textContent = user.nickname || user.username;
      document.getElementById("userAvatar").src = user.avatar || "/default-avatar.png";
      const adminLink = document.getElementById("adminLink");
      if (adminLink) adminLink.style.display = user.role === "superadmin" ? "" : "none";
    }

    function showAuth(mode) {
      document.getElementById("authTitle").textContent = mode === "login" ? "登录" : "注册";
      document.getElementById("authSubmitBtn").textContent = mode === "login" ? "登录" : "注册";
      document.getElementById("authSubmitBtn").onclick = mode === "login" ? doLogin : doRegister;
      document.getElementById("inviteRow").style.display = mode === "login" ? "none" : "block";
      document.getElementById("nicknameRow").style.display = mode === "login" ? "none" : "block";
      document.getElementById("captchaRow").style.display = mode === "register" ? "flex" : "none";
      if (mode === "register") refreshCaptcha();
      document.getElementById("authSwitch").innerHTML = mode === "login"
        ? '没有账号？<a href="javascript:void(0)" onclick="showAuth(\'register\')">去注册</a>'
        : '已有账号？<a href="javascript:void(0)" onclick="showAuth(\'login\')">去登录</a>';
      document.getElementById("authModal").classList.add("show");
      document.getElementById("authUsername").value = "";
      document.getElementById("authPassword").value = "";
      if (document.getElementById("authNickname")) document.getElementById("authNickname").value = "";
      document.getElementById("authUsername").focus();
    }

    function closeAuth() { document.getElementById("authModal").classList.remove("show"); }

    async function doLogin() {
      const username = document.getElementById("authUsername").value.trim();
      const password = document.getElementById("authPassword").value.trim();
      if (!username || !password) { showToast("请填写完整"); return; }
      try {
        const res = await fetch(API + "/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem("token", data.token);
        localStorage.setItem("ps_main_token", data.token);
        closeAuth(); showLoggedIn(data);
        showToast("欢迎回来，" + (data.nickname || data.username));
      } catch (err) { showToast(err.message); }
    }

    async function refreshCaptcha() {
      try {
        const res = await fetch(API + "/captcha");
        const data = await res.json();
        document.getElementById("captchaQuestion").textContent = data.question;
        document.getElementById("captchaInput").value = "";
        captchaToken = data.token;
      } catch { showToast("获取验证码失败"); }
    }

    async function doRegister() {
      const username = document.getElementById("authUsername").value.trim();
      const password = document.getElementById("authPassword").value.trim();
      const nickname = document.getElementById("authNickname").value.trim();
      const captchaAnswer = document.getElementById("captchaInput").value.trim();
      if (!username || !password) { showToast("请填写完整"); return; }
      const inviteCode = document.getElementById("authInviteCode").value.trim();
      if (!inviteCode) { showToast("请填写邀请码"); return; }
      if (!captchaAnswer) { showToast("请输入验证码答案"); return; }
      try {
        const res = await fetch(API + "/register", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, nickname, captchaToken, captchaAnswer, inviteCode })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem("token", data.token);
        localStorage.setItem("ps_main_token", data.token);
        closeAuth(); showLoggedIn(data);
        showToast("注册成功，欢迎 " + (data.nickname || data.username));
      } catch (err) { showToast(err.message); refreshCaptcha(); }
    }

    function doLogout() {
      const token = localStorage.getItem("token");
      if (token) fetch(API + "/logout", { method: "POST", headers: { "Authorization": "Bearer " + token } }).catch(() => {});
      localStorage.removeItem("token");
      localStorage.removeItem("ps_main_token");
      document.getElementById("guestBtns").style.display = "";
      document.getElementById("userBtns").style.display = "none";
      showToast("已退出登录");
    }

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    document.addEventListener("keydown", e => { if (e.key === "Escape") closeAuth(); });

    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
      document.querySelector('.hamburger').classList.toggle('active');
      document.getElementById('menuOverlay').classList.toggle('show');
    }
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        if (document.getElementById('navLinks').classList.contains('open')) toggleMenu();
      });
    });
  </script>
</body>
</html>
