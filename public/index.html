<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaBr406</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --border: #222;
      --text: #e5e5e5;
      --text2: #888;
      --accent: #3b82f6;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* === 导航 === */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .nav-logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
      position: relative;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-links a.active::after {
      content: "";
      position: absolute;
      bottom: -17px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
    }

    /* === 主体留白 === */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 56px;
    }
    .center-name {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      opacity: 0.6;
      user-select: none;
    }

    /* === Footer === */
    footer {
      padding: 24px;
      text-align: center;
      color: var(--text2);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }
    footer a { color: var(--text2); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .center-name { font-size: 24px; }
      .nav-links { gap: 20px; }
      .nav-links a { font-size: 13px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">NaBr406</a>
      <div class="nav-links">
        <a href="/" class="active">首页</a>
        <a href="/space/">空间</a>
      </div>
    </div>
  </nav>

  <div class="main">
    <span class="center-name">NaBr406</span>
  </div>

  <footer>
    <p>© 2026 NaBr406 · <a href="https://github.com/NaBr406">GitHub</a></p>
  </footer>
</body>
</html>
