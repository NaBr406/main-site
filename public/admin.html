<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理 - NaBr406</title>
  <script>(function(){try{var t=localStorage.getItem('site-theme');if(t==='light'||t==='dark'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f5f5f7;
      --card: rgba(0,0,0,0.03);
      --card-border: rgba(0,0,0,0.06);
      --text: #1d1d1f;
      --text2: #6e6e73;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.1);
      --nav-bg: rgba(245,245,247,0.72);
      --nav-border: rgba(0,0,0,0.06);
      --mobile-nav-bg: rgba(245,245,247,0.95);
      --mobile-nav-border: rgba(0,0,0,0.06);
    }
    :root[data-theme="dark"] {
      --bg: #050505;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --text2: #86868b;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --nav-bg: rgba(5,5,5,0.72);
      --nav-border: rgba(255,255,255,0.06);
      --mobile-nav-bg: rgba(10,10,10,0.95);
      --mobile-nav-border: rgba(255,255,255,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #050505;
        --card: rgba(255,255,255,0.04);
        --card-border: rgba(255,255,255,0.08);
        --text: #f5f5f7;
        --text2: #86868b;
        --accent: #3b82f6;
        --accent-glow: rgba(59,130,246,0.15);
        --nav-bg: rgba(5,5,5,0.72);
        --nav-border: rgba(255,255,255,0.06);
        --mobile-nav-bg: rgba(10,10,10,0.95);
        --mobile-nav-border: rgba(255,255,255,0.06);
      }
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
    }

    /* 背景光晕 */
    .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
    .glow-orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; animation: float 20s ease-in-out infinite; }
    :root[data-theme="dark"] .glow-orb { opacity: 0.3; }
    @media (prefers-color-scheme: dark) { :root:not([data-theme="light"]) .glow-orb { opacity: 0.3; } }
    .glow-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(59,130,246,0.25), transparent 70%); top: -10%; right: -5%; }
    .glow-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(99,102,241,0.2), transparent 70%); bottom: 10%; left: -10%; animation-delay: -10s; }
    @keyframes float { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-30px) scale(1.05)} 66%{transform:translate(-20px,20px) scale(0.95)} }

    /* 导航栏 */
    nav { position: fixed; top: 0; width: 100%; background: var(--nav-bg); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px); border-bottom: 1px solid var(--nav-border); z-index: 100; }
    .nav-inner { max-width: 980px; margin: 0 auto; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; height: 48px; }
    .nav-logo { font-size: 17px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.3px; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { color: var(--text2); text-decoration: none; font-size: 13px; transition: color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .theme-toggle-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--card-border);
      background: transparent;
      color: var(--text2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover { color: var(--text); border-color: var(--accent); background: var(--card); }
    .hamburger { display: none; background: none; border: none; cursor: pointer; flex-direction: column; gap: 4px; padding: 4px; z-index: 101; }
    .hamburger span { display: block; width: 18px; height: 1.5px; background: var(--text); border-radius: 2px; transition: transform 0.3s, opacity 0.3s; }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
    .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .menu-overlay.show { display: block; }

    @media (max-width: 640px) {
      .hamburger { display: flex; }
      .nav-links {
        display: none; position: fixed; top: 0; right: 0; width: 240px; height: 100vh;
        background: var(--mobile-nav-bg); backdrop-filter: blur(30px);
        border-left: 1px solid var(--mobile-nav-border);
        flex-direction: column; align-items: flex-start; padding: 64px 24px 24px; gap: 0; z-index: 100;
        animation: slideIn 0.3s ease;
      }
      @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 15px; padding: 14px 0; width: 100%; border-bottom: 1px solid rgba(0,0,0,0.06); }
    }
    /* mobile nav follows theme variables */

    /* 主内容 */
    .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 72px 20px 40px; }
    .page-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }

    /* 卡片 */
    .card {
      background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
      padding: 22px; margin-bottom: 16px; backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
    .card h4 { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }

    /* 访客列表 */
    .visitor-list { display: flex; flex-direction: column; gap: 4px; max-height: 500px; overflow-y: auto; }
    .visitor-item { display: flex; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 10px; transition: background 0.2s; }
    .visitor-item:hover { background: rgba(255,255,255,0.04); }
    .visitor-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
    .visitor-ip-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .visitor-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .visitor-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .visitor-name.visitor-ip { font-family: "SF Mono", Monaco, monospace; font-size: 12px; color: var(--text2); }
    .visitor-time { font-size: 11px; color: var(--text2); }
    .visitor-list::-webkit-scrollbar { width: 4px; }
    .visitor-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    .no-access { text-align: center; padding: 80px 20px; color: var(--text2); font-size: 14px; }
    .no-access a { color: var(--accent); text-decoration: none; }
    .loading { text-align: center; padding: 40px; color: var(--text2); font-size: 13px; }

    /* Toast */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(20,20,20,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px 24px; border-radius: 12px; font-size: 14px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 300; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Footer */
    footer { position: relative; z-index: 1; padding: 40px 24px; text-align: center; color: var(--text2); font-size: 12px; border-top: 1px solid rgba(255,255,255,0.06); }
    footer a { color: var(--text2); text-decoration: none; transition: color 0.2s; }
    footer a:hover { color: var(--text); }

    @media (max-width: 640px) {
      .container { padding: 60px 16px 30px; }
      .page-title { font-size: 18px; }
      .card { padding: 16px; }
      footer { padding: 24px 16px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="bg-glow">
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>
  </div>

  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">NaBr406</a>
      <button class="hamburger" onclick="toggleMenu()" aria-label="菜单"><span></span><span></span><span></span></button>
      <div class="nav-links" id="navLinks">
        <a href="/">首页</a>
        <a href="/space/">空间</a>
        <a href="/space/announcements">公告</a>
        <a href="/admin.html" class="active">管理</a>
        <button class="theme-toggle-btn" data-theme-toggle type="button" title="切换主题"></button>
      </div>
    </div>
  </nav>

  <div class="container" id="content">
    <div class="loading">验证权限中...</div>
  </div>

  <footer>
    <p>&copy; 2026 NaBr406 · <a href="https://github.com/NaBr406">GitHub</a> · <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">鄂ICP备2026008759号</a></p>
  </footer>

  <div class="toast" id="toast"></div>
  <div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

  <script src="/theme.js?v=2026030503"></script>
  <script>
    const API = "/api";

    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
      document.querySelector('.hamburger').classList.toggle('active');
      document.getElementById('menuOverlay').classList.toggle('show');
    }
    document.querySelectorAll('.nav-links a').forEach(a => {
      a.addEventListener('click', () => {
        if (document.getElementById('navLinks').classList.contains('open')) toggleMenu();
      });
    });

    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg; t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 2500);
    }

    function formatTime(str) {
      if (!str) return "";
      const d = new Date(str.replace(" ", "T"));
      const now = new Date();
      const diff = (now - d) / 1000;
      if (diff < 60) return "刚刚";
      if (diff < 3600) return Math.floor(diff / 60) + "分钟前";
      if (diff < 86400) return Math.floor(diff / 3600) + "小时前";
      if (diff < 604800) return Math.floor(diff / 86400) + "天前";
      return d.toLocaleDateString("zh-CN");
    }

    function esc(text) { const d = document.createElement("div"); d.textContent = text || ""; return d.innerHTML; }

    async function init() {
      const token = localStorage.getItem("token");
      if (!token) {
        document.getElementById("content").innerHTML = '<div class="no-access">请先<a href="/">登录</a>后访问</div>';
        return;
      }
      try {
        const res = await fetch(API + "/me", { headers: { "Authorization": "Bearer " + token } });
        if (!res.ok) throw new Error("未登录");
        const user = await res.json();
        if (user.role !== "superadmin") {
          document.getElementById("content").innerHTML = '<div class="no-access">仅超级管理员可访问</div>';
          return;
        }
        renderAdmin(token);
      } catch {
        document.getElementById("content").innerHTML = '<div class="no-access">请先<a href="/">登录</a>后访问</div>';
      }
    }

    async function renderAdmin(token) {
      const container = document.getElementById("content");
      container.innerHTML = `
        <div class="page-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          管理面板
        </div>
        <div class="card">
          <h4>
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            最近访客
          </h4>
          <div class="visitor-list" id="visitorList"><div class="loading">加载中...</div></div>
        </div>
      `;

      try {
        const res = await fetch(API + "/visitors?limit=50", { headers: { "Authorization": "Bearer " + token } });
        const visitors = await res.json();
        const list = document.getElementById("visitorList");
        if (!visitors.length) {
          list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2)">暂无访客记录</div>';
          return;
        }
        list.innerHTML = visitors.map(v => {
          const time = formatTime(v.visited_at);
          if (v.user_id && v.nickname) {
            const avatar = v.avatar || '/default-avatar.png';
            return `<div class="visitor-item">
              <img src="${esc(avatar)}" class="visitor-avatar">
              <div class="visitor-info"><span class="visitor-name">${esc(v.nickname)}</span><span class="visitor-time">${time}</span></div>
            </div>`;
          } else {
            return `<div class="visitor-item">
              <div class="visitor-ip-icon">👤</div>
              <div class="visitor-info"><span class="visitor-name visitor-ip">${esc(v.ip || '未知')}</span><span class="visitor-time">${time}</span></div>
            </div>`;
          }
        }).join("");
      } catch {
        document.getElementById("visitorList").innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center">加载失败</div>';
      }
    }

    init();
  </script>
</body>
</html>
